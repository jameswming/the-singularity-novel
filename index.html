<!DOCTYPE html>
<html lang="en">
<head>

    <title>THE SINGULARITY | Binary Dystopia Interactive Archive</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --bg-dark: #050505;
        }

        body {
            margin: 0;
            background: 
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('cover.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .terminal-window {
            background: rgba(10, 10, 10, 0.9);

            width: 90%;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.2);
            backdrop-filter: blur(10px);
        }

        .glitch {
            font-size: 2rem;
            text-align: center;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .archive-list {
            list-style: none;
            padding: 0;
            margin-top: 30px;
        }

        .archive-item {
            margin-bottom: 15px;
            border-bottom: 1px style solid rgba(0, 255, 65, 0.1);
            padding-bottom: 10px;
        }

        .archive-link {
            color: var(--neon-green);
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            transition: 0.3s;
        }

        .archive-link:hover {
            background: var(--neon-green);
            color: #000;
            padding-left: 10px;
        }

        .status-bar {
            font-size: 0.8rem;
            margin-top: 30px;
            color: #555;
            border-top: 1px solid #333;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="terminal-window">
